<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 880" width="920" height="880" role="img" aria-labelledby="cTitle cDesc">
  <title id="cTitle">The Coder agent loop</title>
  <desc id="cDesc">You ask, the model plans, it calls a tool, the Permission Guard decides, Rust executes, the result feeds back. Denied calls are blocked and logged.</desc>

  <defs>
    <linearGradient id="cBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1017"/><stop offset="1" stop-color="#0a0c11"/>
    </linearGradient>
    <linearGradient id="cRule" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.32"/><stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="920" height="880" rx="20" fill="url(#cBg)"/>

  <text x="28" y="44" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" fill="#5c636e" letter-spacing="3">CODER</text>
  <text x="28" y="76" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="25" font-weight="700" fill="#ffffff">The agent never touches disk unsupervised</text>
  <line x1="28" y1="94" x2="892" y2="94" stroke="url(#cRule)"/>

  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace">

    <!-- 01 -->
    <rect x="92" y="112" width="800" height="88" rx="13" fill="#12151c" stroke="#ffffff" stroke-opacity="0.10"/>
    <circle cx="60" cy="156" r="21" fill="#171b24" stroke="#ffffff" stroke-opacity="0.16"/>
    <text x="60" y="161" font-size="13" fill="#9aa1ac" text-anchor="middle">01</text>
    <text x="118" y="148" font-size="16" font-weight="700" fill="#ffffff">You ask</text>
    <text x="118" y="174" font-size="12.5" fill="#9aa1ac">In plain language, with a real project folder open.</text>

    <g stroke="#ffffff" stroke-opacity="0.30" stroke-width="1.6" fill="none">
      <path d="M60 177 L60 205"/><path d="M54 199 L60 207 L66 199"/>
    </g>

    <!-- 02 -->
    <rect x="92" y="212" width="800" height="88" rx="13" fill="#12151c" stroke="#ffffff" stroke-opacity="0.10"/>
    <circle cx="60" cy="256" r="21" fill="#171b24" stroke="#ffffff" stroke-opacity="0.16"/>
    <text x="60" y="261" font-size="13" fill="#9aa1ac" text-anchor="middle">02</text>
    <text x="118" y="248" font-size="16" font-weight="700" fill="#ffffff">The model plans</text>
    <text x="118" y="274" font-size="12.5" fill="#9aa1ac">Any of twelve providers — a frontier model, or Ollama on your own hardware.</text>

    <g stroke="#ffffff" stroke-opacity="0.30" stroke-width="1.6" fill="none">
      <path d="M60 277 L60 305"/><path d="M54 299 L60 307 L66 299"/>
    </g>

    <!-- 03 -->
    <rect x="92" y="312" width="800" height="88" rx="13" fill="#12151c" stroke="#ffffff" stroke-opacity="0.10"/>
    <circle cx="60" cy="356" r="21" fill="#171b24" stroke="#ffffff" stroke-opacity="0.16"/>
    <text x="60" y="361" font-size="13" fill="#9aa1ac" text-anchor="middle">03</text>
    <text x="118" y="348" font-size="16" font-weight="700" fill="#ffffff">It calls a tool</text>
    <text x="118" y="374" font-size="12.5" fill="#9aa1ac">readFile · writeFile · shell · execute_python</text>

    <g stroke="#ffffff" stroke-opacity="0.30" stroke-width="1.6" fill="none">
      <path d="M60 377 L60 405"/><path d="M54 399 L60 407 L66 399"/>
    </g>

    <!-- 04 GUARD -->
    <rect x="92" y="412" width="800" height="88" rx="13" fill="#161a22" stroke="#ffffff" stroke-opacity="0.45"/>
    <circle cx="60" cy="456" r="21" fill="#171b24" stroke="#ffffff" stroke-opacity="0.45"/>
    <text x="60" y="461" font-size="13" fill="#ffffff" text-anchor="middle">04</text>
    <text x="118" y="448" font-size="16" font-weight="700" fill="#ffffff">The Permission Guard decides</text>
    <text x="118" y="474" font-size="12.5" fill="#9aa1ac">The hard denylist runs first. Whatever survives it, you approve or refuse.</text>

    <!-- deny inset -->
    <g stroke="#f87171" stroke-opacity="0.45" stroke-width="1.6" fill="none">
      <path d="M760 500 L760 520"/><path d="M754 514 L760 522 L766 514"/>
    </g>
    <text x="774" y="516" font-size="10.5" fill="#f87171">denied</text>

    <rect x="136" y="524" width="756" height="76" rx="12" fill="#12151c" stroke="#f87171" stroke-opacity="0.24"/>
    <text x="158" y="550" font-size="14" font-weight="700" fill="#ffffff">Blocked, then written to the audit log</text>
    <text x="158" y="572" font-size="11.5" fill="#5c636e">Compiled into Rust, unreachable from JavaScript, never overridable:</text>
    <text x="158" y="590" font-size="11.5" fill="#9aa1ac">~/.ssh · ~/.aws · ~/.gnupg · /Library/Keychains · /etc · /System · /usr/bin</text>

    <g stroke="#4ade80" stroke-opacity="0.45" stroke-width="1.6" fill="none">
      <path d="M60 477 L60 617"/><path d="M54 611 L60 619 L66 611"/>
    </g>
    <text x="74" y="556" font-size="10.5" fill="#4ade80">allowed</text>

    <!-- 05 -->
    <rect x="92" y="624" width="800" height="88" rx="13" fill="#12151c" stroke="#ffffff" stroke-opacity="0.10"/>
    <circle cx="60" cy="668" r="21" fill="#171b24" stroke="#ffffff" stroke-opacity="0.16"/>
    <text x="60" y="673" font-size="13" fill="#9aa1ac" text-anchor="middle">05</text>
    <text x="118" y="660" font-size="16" font-weight="700" fill="#ffffff">Rust runs it</text>
    <text x="118" y="686" font-size="12.5" fill="#9aa1ac">The real filesystem, real processes — and a line in the audit log either way.</text>

    <g stroke="#ffffff" stroke-opacity="0.30" stroke-width="1.6" fill="none">
      <path d="M60 689 L60 717"/><path d="M54 711 L60 719 L66 711"/>
    </g>

    <!-- 06 -->
    <rect x="92" y="724" width="800" height="88" rx="13" fill="#12151c" stroke="#ffffff" stroke-opacity="0.30"/>
    <circle cx="60" cy="768" r="21" fill="#171b24" stroke="#ffffff" stroke-opacity="0.30"/>
    <text x="60" y="773" font-size="13" fill="#ffffff" text-anchor="middle">06</text>
    <text x="118" y="760" font-size="16" font-weight="700" fill="#ffffff">You get a diff</text>
    <text x="118" y="786" font-size="12.5" fill="#9aa1ac">Every change shown as a block you can expand, not a summary you must trust.</text>

    <!-- feedback -->
    <g stroke="#ffffff" stroke-opacity="0.22" stroke-width="1.5" fill="none" stroke-dasharray="5 5">
      <path d="M892 768 L906 768 L906 256 L898 256"/>
    </g>
    <g stroke="#ffffff" stroke-opacity="0.32" stroke-width="1.5" fill="none">
      <path d="M904 250 L894 256 L904 262"/>
    </g>
    <text x="460" y="844" font-size="11.5" fill="#5c636e" text-anchor="middle">The model reads its own result and keeps going until the task is actually done.</text>
  </g>
</svg>
