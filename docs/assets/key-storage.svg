<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" width="1200" height="360" role="img" aria-labelledby="kTitle kDesc">
  <title id="kTitle">Where your API keys live</title>
  <desc id="kDesc">Keys are stored in an app-scoped local store keyed by bundle identifier, not in the macOS Keychain, because Keychain ACLs re-prompt on every unsigned rebuild.</desc>

  <defs>
    <linearGradient id="kBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#080a0f"/><stop offset="1" stop-color="#06070a"/>
    </linearGradient>
    <linearGradient id="kRule" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#c9a96e" stop-opacity="0.55"/><stop offset="1" stop-color="#c9a96e" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="1200" height="360" rx="20" fill="url(#kBg)"/>

  <text x="32" y="44" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#6b6558" letter-spacing="3">API KEYS</text>
  <text x="32" y="76" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="26" font-weight="700" fill="#ece7dc">Stored on your machine, scoped to this app</text>
  <line x1="32" y1="92" x2="1168" y2="92" stroke="url(#kRule)"/>

  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace">

    <!-- flow -->
    <rect x="32" y="116" width="216" height="86" rx="12" fill="#0d1117" stroke="#ffffff" stroke-opacity="0.08"/>
    <g transform="translate(52,136)" fill="none" stroke="#c9a96e" stroke-width="1.8" stroke-linecap="round">
      <circle cx="7" cy="9" r="5"/><path d="M12 9 h12"/><path d="M20 9 v5"/>
    </g>
    <text x="52" y="176" font-size="12.5" fill="#ece7dc">You paste a key</text>
    <text x="52" y="192" font-size="10" fill="#6b6558">Settings, once</text>

    <g stroke="#c9a96e" stroke-opacity="0.45" stroke-width="1.5" fill="none">
      <path d="M248 159 L276 159"/><path d="M270 153 L278 159 L270 165"/>
    </g>

    <rect x="288" y="116" width="252" height="86" rx="12" fill="#12161f" stroke="#c9a96e" stroke-opacity="0.28"/>
    <text x="308" y="146" font-size="12.5" fill="#dfc38e">hc_api_bundle_v2</text>
    <text x="308" y="168" font-size="10" fill="#6b6558">one JSON bundle in the app's</text>
    <text x="308" y="184" font-size="10" fill="#6b6558">own local store</text>

    <g stroke="#c9a96e" stroke-opacity="0.45" stroke-width="1.5" fill="none">
      <path d="M540 159 L568 159"/><path d="M562 153 L570 159 L562 165"/>
    </g>

    <rect x="580" y="116" width="336" height="86" rx="12" fill="#0d1117" stroke="#ffffff" stroke-opacity="0.08"/>
    <text x="600" y="146" font-size="11" fill="#a39d91">~/Library/Application Support/</text>
    <text x="600" y="164" font-size="11" fill="#a39d91">com.hashcortx.app/WebKit/</text>
    <text x="600" y="188" font-size="10" fill="#6b6558">keyed by bundle id — survives every rebuild</text>

    <g stroke="#4ade80" stroke-opacity="0.5" stroke-width="1.5" fill="none">
      <path d="M916 159 L944 159"/><path d="M938 153 L946 159 L938 165"/>
    </g>

    <rect x="956" y="116" width="212" height="86" rx="12" fill="#0d1117" stroke="#4ade80" stroke-opacity="0.28"/>
    <text x="976" y="150" font-size="12.5" fill="#ece7dc">Sent only to</text>
    <text x="976" y="170" font-size="12.5" fill="#ece7dc">that provider</text>
    <text x="976" y="190" font-size="10" fill="#4ade80">and nowhere else</text>

    <!-- why panel -->
    <rect x="32" y="226" width="560" height="110" rx="12" fill="#0d1117" stroke="#ffffff" stroke-opacity="0.08"/>
    <text x="56" y="254" font-size="12" fill="#c9a96e" letter-spacing="2">WHY NOT THE macOS KEYCHAIN</text>
    <text x="56" y="280" font-size="11" fill="#a39d91">A Keychain item's access list is tied to the binary's code signature.</text>
    <text x="56" y="300" font-size="11" fill="#a39d91">While the build is unsigned, every new DMG has a new signature — so macOS</text>
    <text x="56" y="320" font-size="11" fill="#a39d91">would ask for your password again for every key, on every single update.</text>

    <rect x="608" y="226" width="560" height="110" rx="12" fill="#0d1117" stroke="#ffffff" stroke-opacity="0.08"/>
    <text x="632" y="254" font-size="12" fill="#c9a96e" letter-spacing="2">WHAT THIS MEANS FOR YOU</text>
    <text x="632" y="280" font-size="11" fill="#a39d91">Keys sit in a folder only this app writes to, protected by your user account</text>
    <text x="632" y="300" font-size="11" fill="#a39d91">and macOS file permissions — not by Keychain encryption. If you had keys in</text>
    <text x="632" y="320" font-size="11" fill="#a39d91">the old Keychain build, they migrate across once, then that entry is deleted.</text>
  </g>
</svg>
