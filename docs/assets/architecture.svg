<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 930" width="920" height="930" role="img" aria-labelledby="aTitle aDesc">
  <title id="aTitle">HashCortx architecture</title>
  <desc id="aDesc">Vanilla JS renderer, platform bridge, Permission Guard in Rust, Tauri commands, macOS. AI requests go straight from the renderer to the provider.</desc>

  <defs>
    <linearGradient id="aBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1017"/><stop offset="1" stop-color="#0a0c11"/>
    </linearGradient>
    <linearGradient id="aRule" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.32"/><stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="920" height="930" rx="20" fill="url(#aBg)"/>

  <text x="28" y="44" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" fill="#5c636e" letter-spacing="3">HOW IT IS BUILT</text>
  <text x="28" y="76" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="25" font-weight="700" fill="#ffffff">Every call crosses a gate you control</text>
  <line x1="28" y1="94" x2="892" y2="94" stroke="url(#aRule)"/>

  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace">

    <!-- BAND A renderer -->
    <rect x="28" y="112" width="864" height="176" rx="14" fill="#12151c" stroke="#ffffff" stroke-opacity="0.10"/>
    <text x="48" y="138" font-size="12" fill="#5c636e" letter-spacing="2">RENDERER — VANILLA JS, NO BUNDLER, NO FRAMEWORK</text>

    <rect x="48" y="150" width="197" height="48" rx="9" fill="#171b24" stroke="#ffffff" stroke-opacity="0.22"/>
    <text x="62" y="171" font-size="13" fill="#ffffff">app.js</text><text x="231" y="171" font-size="11" fill="#9aa1ac" text-anchor="end">8,904</text>
    <text x="62" y="188" font-size="10.5" fill="#5c636e">core, chat, tools</text>

    <rect x="257" y="150" width="197" height="48" rx="9" fill="#171b24" stroke="#ffffff" stroke-opacity="0.08"/>
    <text x="271" y="171" font-size="13" fill="#ffffff">system-maker.js</text><text x="440" y="171" font-size="11" fill="#5c636e" text-anchor="end">4,184</text>
    <text x="271" y="188" font-size="10.5" fill="#5c636e">ERP prototypes</text>

    <rect x="466" y="150" width="197" height="48" rx="9" fill="#171b24" stroke="#ffffff" stroke-opacity="0.08"/>
    <text x="480" y="171" font-size="13" fill="#ffffff">virtual-os.js</text><text x="649" y="171" font-size="11" fill="#5c636e" text-anchor="end">3,837</text>
    <text x="480" y="188" font-size="10.5" fill="#5c636e">project desktop</text>

    <rect x="675" y="150" width="197" height="48" rx="9" fill="#171b24" stroke="#ffffff" stroke-opacity="0.08"/>
    <text x="689" y="171" font-size="13" fill="#ffffff">forge-mode.js</text><text x="858" y="171" font-size="11" fill="#5c636e" text-anchor="end">3,819</text>
    <text x="689" y="188" font-size="10.5" fill="#5c636e">3D planning</text>

    <rect x="48" y="210" width="197" height="48" rx="9" fill="#171b24" stroke="#ffffff" stroke-opacity="0.08"/>
    <text x="62" y="231" font-size="13" fill="#ffffff">swarm-maker.js</text><text x="231" y="231" font-size="11" fill="#5c636e" text-anchor="end">3,022</text>
    <text x="62" y="248" font-size="10.5" fill="#5c636e">chain, vote, failover</text>

    <rect x="257" y="210" width="197" height="48" rx="9" fill="#171b24" stroke="#ffffff" stroke-opacity="0.08"/>
    <text x="271" y="231" font-size="13" fill="#ffffff">finance-mode.js</text><text x="440" y="231" font-size="11" fill="#5c636e" text-anchor="end">2,710</text>
    <text x="271" y="248" font-size="10.5" fill="#5c636e">statements to KPIs</text>

    <rect x="466" y="210" width="197" height="48" rx="9" fill="#171b24" stroke="#ffffff" stroke-opacity="0.22"/>
    <text x="480" y="231" font-size="13" fill="#ffffff">code-mode.js</text><text x="649" y="231" font-size="11" fill="#9aa1ac" text-anchor="end">2,215</text>
    <text x="480" y="248" font-size="10.5" fill="#5c636e">the coding agent loop</text>

    <rect x="675" y="210" width="197" height="48" rx="9" fill="#171b24" stroke="#ffffff" stroke-opacity="0.08"/>
    <text x="689" y="231" font-size="13" fill="#ffffff">sandbox.js</text><text x="858" y="231" font-size="11" fill="#5c636e" text-anchor="end">603</text>
    <text x="689" y="248" font-size="10.5" fill="#5c636e">security scanner</text>

    <g stroke="#ffffff" stroke-opacity="0.35" stroke-width="1.6" fill="none">
      <path d="M460 288 L460 310"/><path d="M454 304 L460 312 L466 304"/>
    </g>

    <!-- BAND B bridge -->
    <rect x="28" y="320" width="864" height="100" rx="14" fill="#12151c" stroke="#ffffff" stroke-opacity="0.10"/>
    <text x="48" y="346" font-size="12" fill="#5c636e" letter-spacing="2">PLATFORM BRIDGE — window.HC</text>

    <rect x="48" y="358" width="266" height="46" rx="9" fill="#171b24" stroke="#ffffff" stroke-opacity="0.08"/>
    <text x="62" y="378" font-size="13" fill="#ffffff">hashcoder.js</text>
    <text x="62" y="395" font-size="10.5" fill="#5c636e">HC.code.* file and shell tools</text>

    <rect x="326" y="358" width="266" height="46" rx="9" fill="#171b24" stroke="#ffffff" stroke-opacity="0.30"/>
    <text x="340" y="378" font-size="13" fill="#ffffff">guard.js</text>
    <text x="340" y="395" font-size="10.5" fill="#5c636e">HC.guard.request() prompt</text>

    <rect x="604" y="358" width="268" height="46" rx="9" fill="#171b24" stroke="#ffffff" stroke-opacity="0.08"/>
    <text x="618" y="378" font-size="13" fill="#ffffff">keychain.js</text>
    <text x="618" y="395" font-size="10.5" fill="#5c636e">key bundle, app-scoped store</text>

    <g stroke="#ffffff" stroke-opacity="0.35" stroke-width="1.6" fill="none">
      <path d="M460 420 L460 442"/><path d="M454 436 L460 444 L466 436"/>
    </g>

    <!-- BAND C guard -->
    <rect x="28" y="452" width="864" height="100" rx="14" fill="#161a22" stroke="#ffffff" stroke-opacity="0.45"/>
    <text x="48" y="478" font-size="12" fill="#ffffff" letter-spacing="2">PERMISSION GUARD — RUST, ALWAYS ON, NOT OVERRIDABLE</text>

    <rect x="48" y="490" width="406" height="46" rx="9" fill="#171b24" stroke="#ffffff" stroke-opacity="0.24"/>
    <text x="62" y="510" font-size="13" fill="#ffffff">security/denylist.rs</text>
    <text x="62" y="527" font-size="10.5" fill="#9aa1ac">~/.ssh · ~/.aws · ~/.gnupg · /etc · /System · /usr/bin</text>

    <rect x="466" y="490" width="406" height="46" rx="9" fill="#171b24" stroke="#ffffff" stroke-opacity="0.08"/>
    <text x="480" y="510" font-size="13" fill="#ffffff">commands/audit.rs</text>
    <text x="480" y="527" font-size="10.5" fill="#9aa1ac">every guarded action lands in the audit log</text>

    <g stroke="#ffffff" stroke-opacity="0.35" stroke-width="1.6" fill="none">
      <path d="M460 552 L460 574"/><path d="M454 568 L460 576 L466 568"/>
    </g>

    <!-- BAND D rust -->
    <rect x="28" y="584" width="864" height="100" rx="14" fill="#12151c" stroke="#ffffff" stroke-opacity="0.10"/>
    <text x="48" y="610" font-size="12" fill="#5c636e" letter-spacing="2">TAURI v2 COMMANDS — RUST, 919 LINES TOTAL</text>

    <rect x="48" y="622" width="156" height="46" rx="9" fill="#171b24" stroke="#ffffff" stroke-opacity="0.08"/>
    <text x="62" y="642" font-size="12.5" fill="#ffffff">fs.rs</text><text x="190" y="642" font-size="10.5" fill="#5c636e" text-anchor="end">343</text>
    <text x="62" y="659" font-size="10.5" fill="#5c636e">read / write</text>

    <rect x="214" y="622" width="156" height="46" rx="9" fill="#171b24" stroke="#ffffff" stroke-opacity="0.08"/>
    <text x="228" y="642" font-size="12.5" fill="#ffffff">shell.rs</text><text x="356" y="642" font-size="10.5" fill="#5c636e" text-anchor="end">133</text>
    <text x="228" y="659" font-size="10.5" fill="#5c636e">processes</text>

    <rect x="380" y="622" width="156" height="46" rx="9" fill="#171b24" stroke="#ffffff" stroke-opacity="0.08"/>
    <text x="394" y="642" font-size="12.5" fill="#ffffff">keychain.rs</text><text x="522" y="642" font-size="10.5" fill="#5c636e" text-anchor="end">113</text>
    <text x="394" y="659" font-size="10.5" fill="#5c636e">one-time migration</text>

    <rect x="546" y="622" width="156" height="46" rx="9" fill="#171b24" stroke="#ffffff" stroke-opacity="0.08"/>
    <text x="560" y="642" font-size="12.5" fill="#ffffff">usage_log.rs</text><text x="688" y="642" font-size="10.5" fill="#5c636e" text-anchor="end">93</text>
    <text x="560" y="659" font-size="10.5" fill="#5c636e">token counts</text>

    <rect x="712" y="622" width="160" height="46" rx="9" fill="#171b24" stroke="#ffffff" stroke-opacity="0.08"/>
    <text x="726" y="642" font-size="12.5" fill="#ffffff">audit.rs</text><text x="858" y="642" font-size="10.5" fill="#5c636e" text-anchor="end">52</text>
    <text x="726" y="659" font-size="10.5" fill="#5c636e">append-only</text>

    <g stroke="#ffffff" stroke-opacity="0.35" stroke-width="1.6" fill="none">
      <path d="M460 684 L460 706"/><path d="M454 700 L460 708 L466 700"/>
    </g>

    <!-- BAND E macOS -->
    <rect x="28" y="716" width="864" height="70" rx="14" fill="#12151c" stroke="#ffffff" stroke-opacity="0.10"/>
    <text x="48" y="744" font-size="12" fill="#5c636e" letter-spacing="2">macOS</text>
    <text x="48" y="768" font-size="12" fill="#9aa1ac">filesystem · processes · ~/.hashcortx/usage.jsonl · ~/.hashcortx/audit.log</text>
    <text x="872" y="758" font-size="11" fill="#4ade80" text-anchor="end">your machine</text>

    <!-- BAND F network -->
    <rect x="28" y="806" width="864" height="100" rx="14" fill="#12151c" stroke="#ffffff" stroke-opacity="0.10"/>
    <text x="48" y="832" font-size="12" fill="#5c636e" letter-spacing="2">NETWORK PATH — THE RENDERER CALLS THE PROVIDER DIRECTLY</text>

    <rect x="48" y="844" width="196" height="44" rx="9" fill="#171b24" stroke="#ffffff" stroke-opacity="0.22"/>
    <text x="62" y="864" font-size="12.5" fill="#ffffff">Your device</text>
    <text x="62" y="880" font-size="10.5" fill="#5c636e">renderer issues fetch()</text>

    <g stroke="#ffffff" stroke-opacity="0.35" stroke-width="1.6" fill="none">
      <path d="M252 866 L286 866"/><path d="M280 860 L288 866 L280 872"/>
    </g>
    <text x="269" y="854" font-size="9.5" fill="#5c636e" text-anchor="middle">HTTPS</text>

    <rect x="296" y="844" width="196" height="44" rx="9" fill="#171b24" stroke="#ffffff" stroke-opacity="0.08"/>
    <text x="310" y="864" font-size="12.5" fill="#ffffff">Provider API</text>
    <text x="310" y="880" font-size="10.5" fill="#5c636e">the key you configured</text>

    <g stroke="#ffffff" stroke-opacity="0.35" stroke-width="1.6" fill="none">
      <path d="M500 866 L534 866"/><path d="M528 860 L536 866 L528 872"/>
    </g>

    <rect x="544" y="844" width="196" height="44" rx="9" fill="#171b24" stroke="#4ade80" stroke-opacity="0.28"/>
    <text x="558" y="864" font-size="12.5" fill="#ffffff">Back to you</text>
    <text x="558" y="880" font-size="10.5" fill="#4ade80">tokens logged locally</text>

    <rect x="756" y="844" width="116" height="44" rx="9" fill="#171b24" stroke="#f87171" stroke-opacity="0.24"/>
    <path d="M770 866 h14" stroke="#f87171" stroke-width="1.6"/>
    <text x="792" y="862" font-size="10.5" fill="#9aa1ac">no server</text>
    <text x="792" y="877" font-size="10.5" fill="#9aa1ac">no telemetry</text>
  </g>
</svg>
