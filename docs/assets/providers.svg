<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 578" width="920" height="578" role="img" aria-labelledby="pTitle pDesc">
  <title id="pTitle">Supported providers</title>
  <desc id="pDesc">Eleven cloud providers plus Ollama for local models, and four grounding backends.</desc>

  <defs>
    <linearGradient id="pBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1017"/><stop offset="1" stop-color="#0a0c11"/>
    </linearGradient>
    <linearGradient id="pRule" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.32"/><stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="920" height="578" rx="20" fill="url(#pBg)"/>

  <text x="28" y="44" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" fill="#5c636e" letter-spacing="3">BRING YOUR OWN KEY</text>
  <text x="28" y="76" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="25" font-weight="700" fill="#ffffff">Twelve providers, side by side</text>
  <line x1="28" y1="94" x2="892" y2="94" stroke="url(#pRule)"/>

  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace">

    <!-- row 1 -->
    <rect x="28" y="112" width="277" height="64" rx="11" fill="#12151c" stroke="#ffffff" stroke-opacity="0.10"/>
    <circle cx="50" cy="144" r="4" fill="#ffffff"/>
    <text x="68" y="139" font-size="13.5" fill="#ffffff">Anthropic</text>
    <text x="68" y="159" font-size="11" fill="#5c636e">Opus · Sonnet · Haiku</text>

    <rect x="321" y="112" width="277" height="64" rx="11" fill="#12151c" stroke="#ffffff" stroke-opacity="0.10"/>
    <circle cx="343" cy="144" r="4" fill="#ffffff"/>
    <text x="361" y="139" font-size="13.5" fill="#ffffff">OpenAI</text>
    <text x="361" y="159" font-size="11" fill="#5c636e">the GPT family</text>

    <rect x="614" y="112" width="278" height="64" rx="11" fill="#12151c" stroke="#ffffff" stroke-opacity="0.10"/>
    <circle cx="636" cy="144" r="4" fill="#ffffff"/>
    <text x="654" y="139" font-size="13.5" fill="#ffffff">Google Gemini</text>
    <text x="654" y="159" font-size="11" fill="#5c636e">Pro · Flash</text>

    <!-- row 2 -->
    <rect x="28" y="188" width="277" height="64" rx="11" fill="#12151c" stroke="#ffffff" stroke-opacity="0.10"/>
    <circle cx="50" cy="220" r="4" fill="#ffffff"/>
    <text x="68" y="215" font-size="13.5" fill="#ffffff">Groq</text>
    <text x="68" y="235" font-size="11" fill="#5c636e">very fast inference</text>

    <rect x="321" y="188" width="277" height="64" rx="11" fill="#12151c" stroke="#ffffff" stroke-opacity="0.10"/>
    <circle cx="343" cy="220" r="4" fill="#ffffff"/>
    <text x="361" y="215" font-size="13.5" fill="#ffffff">Cerebras</text>
    <text x="361" y="235" font-size="11" fill="#5c636e">very fast inference</text>

    <rect x="614" y="188" width="278" height="64" rx="11" fill="#12151c" stroke="#ffffff" stroke-opacity="0.10"/>
    <circle cx="636" cy="220" r="4" fill="#ffffff"/>
    <text x="654" y="215" font-size="13.5" fill="#ffffff">SambaNova</text>
    <text x="654" y="235" font-size="11" fill="#5c636e">Llama and DeepSeek hosting</text>

    <!-- row 3 -->
    <rect x="28" y="264" width="277" height="64" rx="11" fill="#12151c" stroke="#ffffff" stroke-opacity="0.10"/>
    <circle cx="50" cy="296" r="4" fill="#ffffff"/>
    <text x="68" y="291" font-size="13.5" fill="#ffffff">DeepSeek</text>
    <text x="68" y="311" font-size="11" fill="#5c636e">V3 · R1</text>

    <rect x="321" y="264" width="277" height="64" rx="11" fill="#12151c" stroke="#ffffff" stroke-opacity="0.10"/>
    <circle cx="343" cy="296" r="4" fill="#ffffff"/>
    <text x="361" y="291" font-size="13.5" fill="#ffffff">Moonshot</text>
    <text x="361" y="311" font-size="11" fill="#5c636e">Kimi, incl. Kimi for Code</text>

    <rect x="614" y="264" width="278" height="64" rx="11" fill="#12151c" stroke="#ffffff" stroke-opacity="0.10"/>
    <circle cx="636" cy="296" r="4" fill="#ffffff"/>
    <text x="654" y="291" font-size="13.5" fill="#ffffff">Mistral</text>
    <text x="654" y="311" font-size="11" fill="#5c636e">the Mistral family</text>

    <!-- row 4 -->
    <rect x="28" y="340" width="277" height="64" rx="11" fill="#12151c" stroke="#ffffff" stroke-opacity="0.10"/>
    <circle cx="50" cy="372" r="4" fill="#ffffff"/>
    <text x="68" y="367" font-size="13.5" fill="#ffffff">OpenRouter</text>
    <text x="68" y="387" font-size="11" fill="#5c636e">one key, many frontier models</text>

    <rect x="321" y="340" width="277" height="64" rx="11" fill="#12151c" stroke="#ffffff" stroke-opacity="0.10"/>
    <circle cx="343" cy="372" r="4" fill="#ffffff"/>
    <text x="361" y="367" font-size="13.5" fill="#ffffff">NVIDIA NIM</text>
    <text x="361" y="387" font-size="11" fill="#5c636e">NIM-hosted open models</text>

    <rect x="614" y="340" width="278" height="64" rx="11" fill="#161a22" stroke="#4ade80" stroke-opacity="0.38"/>
    <circle cx="636" cy="372" r="4" fill="#4ade80"/>
    <text x="654" y="367" font-size="13.5" fill="#ffffff">Ollama</text>
    <text x="654" y="387" font-size="11" fill="#4ade80">local · no key · works offline</text>

    <!-- grounding -->
    <line x1="28" y1="436" x2="892" y2="436" stroke="#ffffff" stroke-opacity="0.08"/>
    <text x="28" y="466" font-size="12" fill="#5c636e" letter-spacing="2">GROUNDING BACKENDS — OPTIONAL, FOR AGENTS THAT MUST CITE</text>

    <rect x="28" y="484" width="207" height="52" rx="11" fill="#12151c" stroke="#ffffff" stroke-opacity="0.10"/>
    <text x="50" y="515" font-size="12.5" fill="#9aa1ac">Tavily</text>

    <rect x="247" y="484" width="207" height="52" rx="11" fill="#12151c" stroke="#ffffff" stroke-opacity="0.10"/>
    <text x="269" y="515" font-size="12.5" fill="#9aa1ac">Google Search</text>

    <rect x="466" y="484" width="207" height="52" rx="11" fill="#12151c" stroke="#ffffff" stroke-opacity="0.10"/>
    <text x="488" y="515" font-size="12.5" fill="#9aa1ac">Wikipedia</text>

    <rect x="685" y="484" width="207" height="52" rx="11" fill="#12151c" stroke="#ffffff" stroke-opacity="0.10"/>
    <text x="707" y="515" font-size="12.5" fill="#9aa1ac">PubMed</text>
  </g>
</svg>
