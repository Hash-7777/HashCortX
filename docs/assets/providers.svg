<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 440" width="1200" height="440" role="img" aria-labelledby="pTitle pDesc">
  <title id="pTitle">Supported providers</title>
  <desc id="pDesc">Eleven cloud providers plus Ollama for local models, and four grounding backends.</desc>

  <defs>
    <linearGradient id="pBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#080a0f"/><stop offset="1" stop-color="#06070a"/>
    </linearGradient>
    <linearGradient id="pRule" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#c9a96e" stop-opacity="0.55"/><stop offset="1" stop-color="#c9a96e" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="1200" height="440" rx="20" fill="url(#pBg)"/>

  <text x="32" y="44" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#6b6558" letter-spacing="3">BRING YOUR OWN KEY</text>
  <text x="32" y="76" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="26" font-weight="700" fill="#ece7dc">Twelve providers, side by side</text>
  <line x1="32" y1="92" x2="1168" y2="92" stroke="url(#pRule)"/>

  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace">

    <!-- row 1 -->
    <rect x="32" y="112" width="272" height="54" rx="10" fill="#0d1117" stroke="#ffffff" stroke-opacity="0.08"/>
    <circle cx="56" cy="139" r="4" fill="#c9a96e"/>
    <text x="74" y="135" font-size="12.5" fill="#ece7dc">Anthropic</text>
    <text x="74" y="151" font-size="10" fill="#6b6558">Opus · Sonnet · Haiku</text>

    <rect x="320" y="112" width="272" height="54" rx="10" fill="#0d1117" stroke="#ffffff" stroke-opacity="0.08"/>
    <circle cx="344" cy="139" r="4" fill="#c9a96e"/>
    <text x="362" y="135" font-size="12.5" fill="#ece7dc">OpenAI</text>
    <text x="362" y="151" font-size="10" fill="#6b6558">the GPT family</text>

    <rect x="608" y="112" width="272" height="54" rx="10" fill="#0d1117" stroke="#ffffff" stroke-opacity="0.08"/>
    <circle cx="632" cy="139" r="4" fill="#c9a96e"/>
    <text x="650" y="135" font-size="12.5" fill="#ece7dc">Google Gemini</text>
    <text x="650" y="151" font-size="10" fill="#6b6558">Pro · Flash</text>

    <rect x="896" y="112" width="272" height="54" rx="10" fill="#0d1117" stroke="#ffffff" stroke-opacity="0.08"/>
    <circle cx="920" cy="139" r="4" fill="#c9a96e"/>
    <text x="938" y="135" font-size="12.5" fill="#ece7dc">Groq</text>
    <text x="938" y="151" font-size="10" fill="#6b6558">very fast inference</text>

    <!-- row 2 -->
    <rect x="32" y="178" width="272" height="54" rx="10" fill="#0d1117" stroke="#ffffff" stroke-opacity="0.08"/>
    <circle cx="56" cy="205" r="4" fill="#c9a96e"/>
    <text x="74" y="201" font-size="12.5" fill="#ece7dc">Cerebras</text>
    <text x="74" y="217" font-size="10" fill="#6b6558">very fast inference</text>

    <rect x="320" y="178" width="272" height="54" rx="10" fill="#0d1117" stroke="#ffffff" stroke-opacity="0.08"/>
    <circle cx="344" cy="205" r="4" fill="#c9a96e"/>
    <text x="362" y="201" font-size="12.5" fill="#ece7dc">SambaNova</text>
    <text x="362" y="217" font-size="10" fill="#6b6558">Llama · DeepSeek hosting</text>

    <rect x="608" y="178" width="272" height="54" rx="10" fill="#0d1117" stroke="#ffffff" stroke-opacity="0.08"/>
    <circle cx="632" cy="205" r="4" fill="#c9a96e"/>
    <text x="650" y="201" font-size="12.5" fill="#ece7dc">DeepSeek</text>
    <text x="650" y="217" font-size="10" fill="#6b6558">V3 · R1</text>

    <rect x="896" y="178" width="272" height="54" rx="10" fill="#0d1117" stroke="#ffffff" stroke-opacity="0.08"/>
    <circle cx="920" cy="205" r="4" fill="#c9a96e"/>
    <text x="938" y="201" font-size="12.5" fill="#ece7dc">Moonshot</text>
    <text x="938" y="217" font-size="10" fill="#6b6558">Kimi, incl. Kimi for Code</text>

    <!-- row 3 -->
    <rect x="32" y="244" width="272" height="54" rx="10" fill="#0d1117" stroke="#ffffff" stroke-opacity="0.08"/>
    <circle cx="56" cy="271" r="4" fill="#c9a96e"/>
    <text x="74" y="267" font-size="12.5" fill="#ece7dc">Mistral</text>
    <text x="74" y="283" font-size="10" fill="#6b6558">the Mistral family</text>

    <rect x="320" y="244" width="272" height="54" rx="10" fill="#0d1117" stroke="#ffffff" stroke-opacity="0.08"/>
    <circle cx="344" cy="271" r="4" fill="#c9a96e"/>
    <text x="362" y="267" font-size="12.5" fill="#ece7dc">OpenRouter</text>
    <text x="362" y="283" font-size="10" fill="#6b6558">one key, many frontier models</text>

    <rect x="608" y="244" width="272" height="54" rx="10" fill="#0d1117" stroke="#ffffff" stroke-opacity="0.08"/>
    <circle cx="632" cy="271" r="4" fill="#c9a96e"/>
    <text x="650" y="267" font-size="12.5" fill="#ece7dc">NVIDIA NIM</text>
    <text x="650" y="283" font-size="10" fill="#6b6558">NIM-hosted open models</text>

    <rect x="896" y="244" width="272" height="54" rx="10" fill="#12161f" stroke="#4ade80" stroke-opacity="0.38"/>
    <circle cx="920" cy="271" r="4" fill="#4ade80"/>
    <text x="938" y="267" font-size="12.5" fill="#ece7dc">Ollama</text>
    <text x="938" y="283" font-size="10" fill="#4ade80">local · no key · works offline</text>

    <!-- grounding -->
    <line x1="32" y1="326" x2="1168" y2="326" stroke="#ffffff" stroke-opacity="0.07"/>
    <text x="32" y="356" font-size="12" fill="#6b6558" letter-spacing="2">GROUNDING BACKENDS — OPTIONAL, FOR AGENTS THAT MUST CITE</text>

    <rect x="32" y="370" width="272" height="44" rx="10" fill="#0d1117" stroke="#ffffff" stroke-opacity="0.08"/>
    <text x="56" y="397" font-size="11.5" fill="#a39d91">Tavily</text>

    <rect x="320" y="370" width="272" height="44" rx="10" fill="#0d1117" stroke="#ffffff" stroke-opacity="0.08"/>
    <text x="344" y="397" font-size="11.5" fill="#a39d91">Google Programmable Search</text>

    <rect x="608" y="370" width="272" height="44" rx="10" fill="#0d1117" stroke="#ffffff" stroke-opacity="0.08"/>
    <text x="632" y="397" font-size="11.5" fill="#a39d91">Wikipedia</text>

    <rect x="896" y="370" width="272" height="44" rx="10" fill="#0d1117" stroke="#ffffff" stroke-opacity="0.08"/>
    <text x="920" y="397" font-size="11.5" fill="#a39d91">PubMed</text>
  </g>
</svg>
